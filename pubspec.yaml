name: id_scanner
description: "Automatic Identity Card Scanner & Form Filler"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera
  camera: ^0.11.1
  image_picker: ^1.1.2

  # OCR
  google_mlkit_text_recognition: ^0.14.0

  # HTTP for Groq API
  http: ^1.3.0

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
